<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive rating component</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div  class="card" id="card">

    <!--small decorative icon-->
    <div class="icon"> <img src="images/icon-star.svg"></div>

  <!-- the title -->
  <h2>How did we do?</h2>

  <!--the description-->
  <P>
    Please let us know how we did with your support request.
    All feedback is appreciated to help us improve our offering!
  </P>

  <!--rating systems with buttons-->
  <div class="ratings">
    <button class="rating">1</button>
    <button class="rating">2</button>
    <button class="rating">3</button>
    <button class="rating">4</button>
    <button class="rating">5</button>
  </div>

  <!--submit button-->
  <button class="submit_btn">SUBMIT</button>

  </div>
<script src="script.js"></script>
</body>
</html>
